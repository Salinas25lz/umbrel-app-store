manifestVersion: 1
id: bitcoin-dashboard
category: bitcoin
name: Bitcoin Dashboard
version: "1.2.0"
tagline: Real-time visual dashboard for the Bitcoin network
description: >-
  Elegant, minimalistic dashboard that monitors the full state of the Bitcoin
  network in real time. Shows BTC price (USD/EUR), fees in sat/vB and EUR,
  mempool with upcoming blocks, current block height with miner, hashrate,
  difficulty and next adjustment, circulating supply, halving countdown and
  Lightning Network stats. Configurable data sources (local mempool.space /
  public / testnet) with automatic fallback, intelligent caching and live
  connection monitoring. Bilingual UI (EN/ES), light and dark themes.
releaseNotes: >-
  v1.2.0 — Multiple data sources (local/public/testnet), endpoint UI,
  automatic fallback local→public, intelligent cache, response-time
  monitoring, per-card source indicators. Bug fixes in mempool block
  numbering and color contrast.
