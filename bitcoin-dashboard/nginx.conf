server {
    listen 80;

    # Proxy to local Mempool instance (Umbrel internal network gateway)
    location /api/ {
        proxy_pass http://10.21.0.1:3006/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
