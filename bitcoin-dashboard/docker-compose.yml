version: "3.7"

services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8765:80"
    volumes:
      - ${APP_DATA_DIR}/html:/usr/share/nginx/html:ro
      - ${APP_DATA_DIR}/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default

networks:
  default:
    name: umbrel_main_network
    external: true
