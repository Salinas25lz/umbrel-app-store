server {
    listen 80;

    # Proxy for the local mempool.space API.
    # The 'mempool' hostname is provided by Umbrel via extra_hosts in docker-compose.yml.
    location /api/ {
        proxy_pass http://mempool:3006/api/;
        proxy_http_version 1.1;
        proxy_set_header Host mempool:3006;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        add_header Access-Control-Allow-Origin *;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
