<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#070B17"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="redline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <circle cx="128" cy="140" r="100" fill="url(#halo)"/>

  <!-- Tachometer arc (135° sweep, opens at the bottom) -->
  <path d="M 60 162 A 80 80 0 1 1 196 162"
        stroke="#1F2937" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Coloured graduation arc — green → yellow → red, ending in redline -->
  <path d="M 60 162 A 80 80 0 0 1 100 76"
        stroke="#22C55E" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 100 76 A 80 80 0 0 1 156 76"
        stroke="#EAB308" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 156 76 A 80 80 0 0 1 196 162"
        stroke="url(#redline)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Tick marks along the dial -->
  <g stroke="#94A3B8" stroke-width="2" stroke-linecap="round">
    <line x1="60"  y1="162" x2="68"  y2="158"/>
    <line x1="78"  y1="120" x2="86"  y2="123"/>
    <line x1="100" y1="86"  x2="106" y2="92"/>
    <line x1="128" y1="60"  x2="128" y2="68"/>
    <line x1="156" y1="86"  x2="150" y2="92"/>
    <line x1="178" y1="120" x2="170" y2="123"/>
    <line x1="196" y1="162" x2="188" y2="158"/>
  </g>

  <!-- Needle pointing high into the redline -->
  <line x1="128" y1="140" x2="178" y2="86"
        stroke="#F59E0B" stroke-width="4" stroke-linecap="round"/>
  <circle cx="128" cy="140" r="7" fill="#0F172A" stroke="#F59E0B" stroke-width="2.5"/>

  <!-- ₿ centred under the dial, big and confident -->
  <text x="128" y="220"
        font-family="'Helvetica Neue','Inter','Arial',sans-serif"
        font-size="80" font-weight="800"
        text-anchor="middle" fill="url(#amber)"
        letter-spacing="-2">&#x20BF;</text>
</svg>
