<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#070B17"/>
    </linearGradient>
    <linearGradient id="carbon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="display" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0F1C"/>
      <stop offset="100%" stop-color="#020410"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ledRed" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FEE2E2"/>
      <stop offset="40%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </radialGradient>
    <radialGradient id="ledGreen" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#DCFCE7"/>
      <stop offset="40%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#14532D"/>
    </radialGradient>
    <radialGradient id="ledBlue" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#DBEAFE"/>
      <stop offset="40%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </radialGradient>
    <radialGradient id="ledYellow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FEF9C3"/>
      <stop offset="40%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#713F12"/>
    </radialGradient>
    <radialGradient id="ledMagenta" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FCE7F3"/>
      <stop offset="40%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#831843"/>
    </radialGradient>
    <radialGradient id="ledCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#CFFAFE"/>
      <stop offset="40%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#164E63"/>
    </radialGradient>
  </defs>

  <!-- Outer squircle background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="100" fill="url(#glow)"/>

  <!-- F1 wheel — outer carbon ring with flat top/bottom -->
  <path d="M 56 102
           Q 56 60 96 56
           L 160 56
           Q 200 60 200 102
           L 200 154
           Q 200 196 160 200
           L 96 200
           Q 56 196 56 154 Z"
        fill="url(#carbon)" stroke="#0B1220" stroke-width="2"/>

  <!-- Inner bezel ring -->
  <path d="M 70 106
           Q 70 70 100 68
           L 156 68
           Q 186 70 186 106
           L 186 150
           Q 186 186 156 188
           L 100 188
           Q 70 186 70 150 Z"
        fill="#111827" stroke="#374151" stroke-width="1"/>

  <!-- Top LED rev-light strip (5 LEDs) -->
  <circle cx="92"  cy="80" r="4" fill="url(#ledGreen)"/>
  <circle cx="110" cy="76" r="4" fill="url(#ledGreen)"/>
  <circle cx="128" cy="74" r="4" fill="url(#ledYellow)"/>
  <circle cx="146" cy="76" r="4" fill="url(#ledRed)"/>
  <circle cx="164" cy="80" r="4" fill="url(#ledRed)"/>

  <!-- Central OLED display -->
  <rect x="92" y="98" width="72" height="38" rx="4" fill="url(#display)" stroke="#1F2937" stroke-width="1"/>
  <!-- mini sparkline inside display -->
  <polyline points="98,128 108,124 118,126 128,118 138,114 148,108 158,104"
            stroke="#F59E0B" stroke-width="1.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- ₿ symbol top-left of display -->
  <text x="100" y="114"
        font-family="'Helvetica Neue','Inter','Arial',sans-serif"
        font-size="13" font-weight="800"
        fill="#F59E0B">&#x20BF;</text>
  <!-- block-height-style numerical hint -->
  <rect x="120" y="106" width="36" height="2" rx="1" fill="#F59E0B" opacity="0.4"/>
  <rect x="120" y="110" width="28" height="2" rx="1" fill="#F59E0B" opacity="0.3"/>

  <!-- Lower button cluster (3+3 colour buttons) -->
  <!-- left column -->
  <circle cx="92"  cy="156" r="7" fill="url(#ledRed)"     stroke="#1F2937" stroke-width="1"/>
  <circle cx="92"  cy="176" r="7" fill="url(#ledYellow)"  stroke="#1F2937" stroke-width="1"/>
  <!-- centre column -->
  <circle cx="118" cy="166" r="7" fill="url(#ledGreen)"   stroke="#1F2937" stroke-width="1"/>
  <circle cx="138" cy="166" r="7" fill="url(#ledCyan)"    stroke="#1F2937" stroke-width="1"/>
  <!-- right column -->
  <circle cx="164" cy="156" r="7" fill="url(#ledMagenta)" stroke="#1F2937" stroke-width="1"/>
  <circle cx="164" cy="176" r="7" fill="url(#ledBlue)"    stroke="#1F2937" stroke-width="1"/>

  <!-- Side rotary dials -->
  <circle cx="76"  cy="128" r="9" fill="#0F172A" stroke="#374151" stroke-width="1.5"/>
  <line x1="76"  y1="128" x2="76"  y2="121" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  <circle cx="180" cy="128" r="9" fill="#0F172A" stroke="#374151" stroke-width="1.5"/>
  <line x1="180" y1="128" x2="184" y2="123" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>

  <!-- Paddle shifters (small triangles outside the wheel hint) -->
  <path d="M 50 130 L 56 122 L 56 138 Z" fill="#1F2937" stroke="#374151" stroke-width="1"/>
  <path d="M 206 130 L 200 122 L 200 138 Z" fill="#1F2937" stroke="#374151" stroke-width="1"/>

  <!-- Bottom grip cutout hint -->
  <rect x="100" y="206" width="56" height="6" rx="3" fill="#0B1220"/>
</svg>
