<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 128" width="480" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#B45309"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Mark (square icon mirroring icon.svg) -->
  <g transform="translate(8 8)">
    <rect width="112" height="112" rx="26" fill="url(#bg)"/>
    <circle cx="56" cy="46" r="38" fill="url(#glow)"/>
    <text x="56" y="74"
          font-family="'Helvetica Neue','Inter','Arial',sans-serif"
          font-size="72" font-weight="800"
          text-anchor="middle" fill="url(#amber)"
          letter-spacing="-1.5">&#x20BF;</text>
    <polyline points="14,98 30,94 44,96 58,90 72,86 86,80 100,76"
              stroke="url(#amber)" stroke-width="1.6" fill="none"
              stroke-linecap="round" stroke-linejoin="round"
              stroke-opacity="0.7"/>
    <circle cx="100" cy="76" r="2" fill="#FDE68A"/>
  </g>

  <!-- Wordmark -->
  <g font-family="'Helvetica Neue','Inter','Arial',sans-serif" fill="#0F172A">
    <text x="140" y="62" font-size="34" font-weight="700" letter-spacing="-0.5">Bitcoin</text>
    <text x="140" y="98" font-size="34" font-weight="300" letter-spacing="0.5" fill="#475569">Dashboard</text>
  </g>
</svg>
