<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 128" width="520" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#070B17"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#92400E"/>
      <stop offset="55%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="redline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Mark — square tachometer mirroring icon.svg -->
  <g transform="translate(8 8)">
    <rect width="112" height="112" rx="26" fill="url(#bg)"/>
    <circle cx="56" cy="62" r="44" fill="url(#halo)"/>

    <!-- Tachometer arc base (140° sweep) -->
    <path d="M 26 71 A 35 35 0 1 1 86 71"
          stroke="#1F2937" stroke-width="6" fill="none" stroke-linecap="round"/>

    <!-- Coloured graduation arc -->
    <path d="M 26 71 A 35 35 0 0 1 44 33"
          stroke="#22C55E" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <path d="M 44 33 A 35 35 0 0 1 68 33"
          stroke="#EAB308" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <path d="M 68 33 A 35 35 0 0 1 86 71"
          stroke="url(#redline)" stroke-width="2.6" fill="none" stroke-linecap="round"/>

    <!-- Tick marks -->
    <g stroke="#94A3B8" stroke-width="0.8" stroke-linecap="round">
      <line x1="26" y1="71" x2="29.5" y2="69.5"/>
      <line x1="34" y1="51" x2="37.5" y2="52.6"/>
      <line x1="44" y1="37" x2="47"   y2="40"/>
      <line x1="56" y1="27" x2="56"   y2="30.5"/>
      <line x1="68" y1="37" x2="65"   y2="40"/>
      <line x1="78" y1="51" x2="74.5" y2="52.6"/>
      <line x1="86" y1="71" x2="82.5" y2="69.5"/>
    </g>

    <!-- Needle to redline -->
    <line x1="56" y1="62" x2="78" y2="38"
          stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="56" cy="62" r="3" fill="#0F172A" stroke="#F59E0B" stroke-width="1.1"/>

    <!-- ₿ centred below dial -->
    <text x="56" y="98"
          font-family="'Helvetica Neue','Inter','Arial',sans-serif"
          font-size="34" font-weight="800"
          text-anchor="middle" fill="url(#amber)"
          letter-spacing="-1">&#x20BF;</text>
  </g>

  <!-- Wordmark -->
  <g font-family="'Helvetica Neue','Inter','Arial',sans-serif">
    <text x="140" y="62" font-size="34" font-weight="700" fill="#0F172A" letter-spacing="-0.5">Bitcoin</text>
    <text x="140" y="98" font-size="34" font-weight="300" fill="#475569" letter-spacing="0.5">Dashboard</text>
  </g>
</svg>
